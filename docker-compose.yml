services:
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:7001}
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    networks:
      - leszmonitor

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7001:7001"
    env_file:
      - ./backend/.env
    environment:
      - LOG_FILE_PATH=/var/log/leszmonitor/backend.log
      - SQLITE_DB_PATH=/data/leszmonitor.db
    volumes:
      - ./backend/src/leszmonitor.db:/data/leszmonitor.db
    restart: unless-stopped
    networks:
      - leszmonitor

networks:
  leszmonitor:
    driver: bridge
