services:
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:7001}
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    networks:
      - leszmonitor

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "7001:7001"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - LOG_FILE_PATH=/var/log/leszmonitor/backend.log
    restart: unless-stopped
    networks:
      - leszmonitor

  db:
    image: timescale/timescaledb:2.22.1-pg17
    environment:
      POSTGRES_PORT: 5432
      POSTGRES_DB: leszmonitor
      POSTGRES_USER: leszmonitor-dev
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - leszmonitor

networks:
  leszmonitor:
    driver: bridge

volumes:
  timescale_data: